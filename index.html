<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="A dark, stylish quote page with a full-screen background image."
    >
    <title>Quote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
    <script src="site.config.js"></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="quote-page" aria-label="Quote page">
      <section class="quote-stage">
        <p class="kicker"></p>
        <blockquote class="quote" id="quoteText">
          The quieter you become, the more you are able to hear.
        </blockquote>
        <p class="author" id="quoteAuthor">Rumi</p>
      </section>
    </main>
  </body>
</html>
